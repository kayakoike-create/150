<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>書く150・観る150</title>
  <style>
    :root{
      --bg:#f7f4ee;
      --card:#ffffff;
      --ink:#1f1f1f;
      --muted:#6f6a62;
      --line:#ded7cc;
      --accent:#111111;
      --soft:#eee8de;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;
      background:var(--bg);
      color:var(--ink);
      padding:20px;
    }
    .wrap{max-width:720px;margin:0 auto}
    header{margin:10px 0 22px}
    h1{font-size:28px;margin:0 0 6px;letter-spacing:.02em}
    .sub{color:var(--muted);font-size:14px;line-height:1.6}
    .grid{display:grid;grid-template-columns:1fr;gap:14px}
    @media(min-width:720px){.grid{grid-template-columns:1fr 1fr}}
    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:20px;
      padding:18px;
      box-shadow:0 8px 24px rgba(0,0,0,.04);
    }
    h2{font-size:18px;margin:0 0 12px}
    .big{font-size:44px;font-weight:800;line-height:1;margin:12px 0 4px}
    .unit{font-size:14px;color:var(--muted)}
    .bar{height:14px;background:var(--soft);border-radius:999px;overflow:hidden;margin:14px 0 6px}
    .fill{height:100%;background:var(--accent);width:0%;transition:.25s}
    .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    button,input{
      font:inherit;
      border-radius:999px;
      border:1px solid var(--line);
      padding:11px 14px;
      background:white;
      color:var(--ink);
    }
    button.primary{background:var(--accent);color:white;border-color:var(--accent)}
    button.warn{background:#fff4f0}
    input{width:104px}
    .timer{
      font-variant-numeric:tabular-nums;
      font-size:28px;
      font-weight:700;
      margin:10px 0;
    }
    .meta{font-size:13px;color:var(--muted);line-height:1.6}
    .graph{margin-top:14px}
    canvas{width:100%;height:220px;background:var(--card);border:1px solid var(--line);border-radius:20px}
    .footer{margin:16px 0 0;font-size:12px;color:var(--muted);line-height:1.7}
    .pill{display:inline-block;background:var(--soft);padding:4px 9px;border-radius:999px;margin-top:6px}
  </style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>書く150・観る150</h1>
    <div class="sub">脚本は累計150時間。映画は累計150本。毎日ちょっと、週一で深く。</div>
  </header>

  <div class="grid">
    <section class="card">
      <h2>脚本を書く</h2>
      <div class="timer" id="timer">00:00:00</div>
      <div class="row">
        <button class="primary" id="startStop">スタート</button>
        <button id="add10">+10分</button>
        <button id="add30">+30分</button>
        <button id="add90">+90分</button>
      </div>
      <div class="row" style="margin-top:8px">
        <input id="customMin" type="number" min="1" placeholder="分" />
        <button id="addCustom">分を追加</button>
      </div>
      <div class="big"><span id="scriptHours">0.0</span><span class="unit"> h</span></div>
      <div class="bar"><div class="fill" id="scriptFill"></div></div>
      <div class="meta"><span id="scriptPct">0</span>% / 150時間　<span class="pill" id="scriptRemain">残り150.0時間</span></div>
    </section>

    <section class="card">
      <h2>映画を観る</h2>
      <div class="big"><span id="movieCount">0</span><span class="unit"> 本</span></div>
      <div class="bar"><div class="fill" id="movieFill"></div></div>
      <div class="meta"><span id="moviePct">0</span>% / 150本　<span class="pill" id="movieRemain">残り150本</span></div>
      <div class="row" style="margin-top:14px">
        <button class="primary" id="addMovie">+1本</button>
        <button id="addHalfMovie">+0.5本</button>
        <button id="minusMovie">-1本</button>
      </div>
      <div class="meta" style="margin-top:10px">短編・途中まで観たものは0.5本換算にしてもOK。</div>
    </section>
  </div>

  <section class="graph">
    <canvas id="chart" width="900" height="300"></canvas>
  </section>

  <section class="card" style="margin-top:14px">
    <h2>記録</h2>
    <div class="row">
      <button id="saveToday">今日の記録を保存</button>
      <button id="exportData">データを書き出し</button>
      <button class="warn" id="resetAll">リセット</button>
    </div>
    <div class="footer" id="lastSaved">保存データはこの端末のブラウザ内に残ります。</div>
  </section>
</div>

<script>
const SCRIPT_GOAL_MIN = 150 * 60;
const MOVIE_GOAL = 150;
const key = "write150_watch150_v1";

let state = JSON.parse(localStorage.getItem(key) || "{}");
state.scriptMin = state.scriptMin || 0;
state.movies = state.movies || 0;
state.logs = state.logs || [];
state.runningSince = state.runningSince || null;

const $ = id => document.getElementById(id);
let tickInterval = null;

function save(){
  localStorage.setItem(key, JSON.stringify(state));
  render();
}
function runningElapsedMin(){
  if(!state.runningSince) return 0;
  return (Date.now() - state.runningSince) / 60000;
}
function totalScriptMin(){
  return state.scriptMin + runningElapsedMin();
}
function fmtHMS(ms){
  const total = Math.floor(ms/1000);
  const h = String(Math.floor(total/3600)).padStart(2,"0");
  const m = String(Math.floor((total%3600)/60)).padStart(2,"0");
  const s = String(total%60).padStart(2,"0");
  return `${h}:${m}:${s}`;
}
function render(){
  const sMin = totalScriptMin();
  const sHours = sMin/60;
  const sPct = Math.min(100, sMin/SCRIPT_GOAL_MIN*100);
  const mPct = Math.min(100, state.movies/MOVIE_GOAL*100);

  $("scriptHours").textContent = sHours.toFixed(1);
  $("scriptFill").style.width = sPct + "%";
  $("scriptPct").textContent = Math.floor(sPct);
  $("scriptRemain").textContent = `残り${Math.max(0,(SCRIPT_GOAL_MIN-sMin)/60).toFixed(1)}時間`;

  $("movieCount").textContent = Number.isInteger(state.movies) ? state.movies : state.movies.toFixed(1);
  $("movieFill").style.width = mPct + "%";
  $("moviePct").textContent = Math.floor(mPct);
  $("movieRemain").textContent = `残り${Math.max(0, MOVIE_GOAL-state.movies).toFixed(1).replace(".0","")}本`;

  $("startStop").textContent = state.runningSince ? "ストップ" : "スタート";
  $("startStop").className = state.runningSince ? "warn" : "primary";
  $("timer").textContent = state.runningSince ? fmtHMS(Date.now()-state.runningSince) : "00:00:00";

  const last = state.logs[state.logs.length-1];
  $("lastSaved").textContent = last ? `最終保存：${last.date} / 脚本 ${last.scriptHours}h / 映画 ${last.movies}本` : "保存データはこの端末のブラウザ内に残ります。";
  drawChart();
}
function startStop(){
  if(state.runningSince){
    state.scriptMin += runningElapsedMin();
    state.runningSince = null;
    clearInterval(tickInterval);
    tickInterval = null;
  }else{
    state.runningSince = Date.now();
    tickInterval = setInterval(render, 500);
  }
  save();
}
function addMin(min){
  state.scriptMin += min;
  save();
}
function drawChart(){
  const c = $("chart");
  const ctx = c.getContext("2d");
  const w = c.width, h = c.height;
  ctx.clearRect(0,0,w,h);
  ctx.fillStyle = "#ffffff";
  ctx.fillRect(0,0,w,h);
  ctx.strokeStyle = "#ded7cc";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(60,30); ctx.lineTo(60,h-50); ctx.lineTo(w-30,h-50); ctx.stroke();

  const sPct = Math.min(1,totalScriptMin()/SCRIPT_GOAL_MIN);
  const mPct = Math.min(1,state.movies/MOVIE_GOAL);
  const barW = 180;
  const base = h-50;
  const maxH = h-90;

  function bar(x,pct,label,value){
    ctx.fillStyle = "#eee8de";
    ctx.fillRect(x, base-maxH, barW, maxH);
    ctx.fillStyle = "#111111";
    ctx.fillRect(x, base-maxH*pct, barW, maxH*pct);
    ctx.fillStyle = "#1f1f1f";
    ctx.font = "28px -apple-system, sans-serif";
    ctx.fillText(value, x, base-maxH*pct-12);
    ctx.font = "18px -apple-system, sans-serif";
    ctx.fillText(label, x, base+30);
  }
  bar(150,sPct,"脚本 150h",`${Math.floor(sPct*100)}%`);
  bar(480,mPct,"映画 150本",`${Math.floor(mPct*100)}%`);
}

$("startStop").onclick = startStop;
$("add10").onclick = () => addMin(10);
$("add30").onclick = () => addMin(30);
$("add90").onclick = () => addMin(90);
$("addCustom").onclick = () => {
  const v = Number($("customMin").value);
  if(v > 0){ addMin(v); $("customMin").value=""; }
};
$("addMovie").onclick = () => { state.movies += 1; save(); };
$("addHalfMovie").onclick = () => { state.movies += 0.5; save(); };
$("minusMovie").onclick = () => { state.movies = Math.max(0,state.movies-1); save(); };
$("saveToday").onclick = () => {
  const today = new Date().toISOString().slice(0,10);
  state.logs.push({
    date: today,
    scriptHours: (totalScriptMin()/60).toFixed(2),
    movies: state.movies
  });
  save();
};
$("exportData").onclick = () => {
  const blob = new Blob([JSON.stringify(state,null,2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "write150_watch150_data.json";
  a.click();
  URL.revokeObjectURL(url);
};
$("resetAll").onclick = () => {
  if(confirm("本当にリセットしますか？")){
    state = {scriptMin:0,movies:0,logs:[],runningSince:null};
    save();
  }
};
if(state.runningSince) tickInterval = setInterval(render, 500);
render();
</script>
</body>
</html>
