<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>150</title>
  <style>
    :root{
      --bg:#ffffff;
      --ink:#0b0b0b;
      --muted:#8a8a8a;
      --line:#e6e6e6;
      --soft:#f5f5f5;
      --accent:#ff4f1f;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:var(--bg);color:var(--ink)}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue","Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;
      padding:24px 18px 36px;
      letter-spacing:-.02em;
    }
    .wrap{max-width:760px;margin:0 auto}
    header{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:16px;
      margin:6px 0 28px;
      border-bottom:1px solid var(--line);
      padding-bottom:18px;
    }
    h1{
      font-size:48px;
      line-height:.9;
      margin:0;
      font-weight:900;
      letter-spacing:-.06em;
    }
    .date{
      font-size:12px;
      color:var(--muted);
      text-align:right;
      line-height:1.5;
    }
    .grid{display:grid;grid-template-columns:1fr;gap:12px}
    @media(min-width:760px){.grid{grid-template-columns:1fr 1fr}}
    .card{
      border:1px solid var(--line);
      border-radius:24px;
      padding:18px;
      background:#fff;
    }
    h2{
      margin:0 0 16px;
      font-size:13px;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:var(--muted);
      font-weight:700;
    }
    .value{
      font-size:54px;
      line-height:.95;
      font-weight:900;
      letter-spacing:-.06em;
      margin:6px 0 10px;
      font-variant-numeric:tabular-nums;
    }
    .unit{font-size:18px;color:var(--muted);font-weight:700;letter-spacing:0}
    .bar{
      height:3px;
      background:var(--soft);
      overflow:hidden;
      margin:14px 0 10px;
      border-radius:999px;
    }
    .fill{
      height:100%;
      background:var(--ink);
      width:0%;
      transition:.2s ease;
    }
    .fill.accent{background:var(--accent)}
    .meta{
      display:flex;
      justify-content:space-between;
      gap:12px;
      font-size:12px;
      color:var(--muted);
      font-variant-numeric:tabular-nums;
    }
    .timer{
      font-size:28px;
      line-height:1;
      font-weight:800;
      margin:0 0 12px;
      font-variant-numeric:tabular-nums;
      letter-spacing:-.04em;
    }
    .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:8px}
    button,input{
      appearance:none;
      font:inherit;
      font-size:13px;
      border-radius:999px;
      border:1px solid var(--line);
      padding:10px 12px;
      background:#fff;
      color:var(--ink);
    }
    button{
      cursor:pointer;
      font-weight:650;
    }
    button.primary{
      background:var(--ink);
      color:#fff;
      border-color:var(--ink);
    }
    button.accent{
      background:var(--accent);
      color:#fff;
      border-color:var(--accent);
    }
    button.ghost{
      background:var(--soft);
      border-color:var(--soft);
    }
    input{
      width:86px;
      background:#fff;
      font-variant-numeric:tabular-nums;
    }
    .chartCard{margin-top:12px}
    .chartHead{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      margin-bottom:10px;
    }
    .legend{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      font-size:12px;
      color:var(--muted);
    }
    .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--ink);margin-right:5px}
    .dot.accent{background:var(--accent)}
    canvas{
      width:100%;
      height:280px;
      display:block;
      border:1px solid var(--line);
      border-radius:20px;
      background:#fff;
    }
    .footer{
      margin-top:12px;
      font-size:12px;
      color:var(--muted);
      line-height:1.7;
    }
    .smallActions{
      margin-top:12px;
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }
  </style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>150</h1>
    </div>
    <div class="date">
      <div id="todayLabel"></div>
      <div>WRITE 150H / WATCH 150</div>
    </div>
  </header>

  <div class="grid">
    <section class="card">
      <h2>Write</h2>
      <div class="timer" id="timer">00:00:00</div>
      <div class="row">
        <button class="primary" id="startStop">Start</button>
        <button class="ghost" id="add10">+10m</button>
        <button class="ghost" id="add30">+30m</button>
        <button class="ghost" id="add90">+90m</button>
        <button id="minus10">-10m</button>
        <button id="minus30">-30m</button>
      </div>
      <div class="row">
        <input id="customMin" type="number" min="1" placeholder="min" />
        <button class="ghost" id="addCustom">Add</button>
        <button id="minusCustom">Back</button>
      </div>
      <div class="value"><span id="scriptHours">0.0</span><span class="unit"> h</span></div>
      <div class="bar"><div class="fill" id="scriptFill"></div></div>
      <div class="meta">
        <span><span id="scriptPct">0</span>%</span>
        <span id="scriptRemain">150.0h left</span>
      </div>
    </section>

    <section class="card">
      <h2>Watch</h2>
      <div class="value"><span id="movieCount">0</span><span class="unit"> films</span></div>
      <div class="bar"><div class="fill accent" id="movieFill"></div></div>
      <div class="meta">
        <span><span id="moviePct">0</span>%</span>
        <span id="movieRemain">150 left</span>
      </div>
      <div class="row">
        <button class="accent" id="addMovie">+1</button>
        <button class="ghost" id="addHalfMovie">+0.5</button>
        <button id="minusMovie">-1</button>
        <button id="minusHalfMovie">-0.5</button>
      </div>
      <div class="row">
        <input id="customMovie" type="number" min="0.5" step="0.5" placeholder="film" />
        <button class="ghost" id="addCustomMovie">Add</button>
        <button id="minusCustomMovie">Back</button>
      </div>
      <div class="footer">短編・分割視聴は0.5換算でもOK。</div>
    </section>
  </div>

  <section class="card chartCard">
    <div class="chartHead">
      <h2>Progress</h2>
      <div class="legend">
        <span><i class="dot"></i>Write</span>
        <span><i class="dot accent"></i>Watch</span>
      </div>
    </div>
    <canvas id="chart" width="1000" height="360"></canvas>
    <div class="footer">横軸＝日付、縦軸＝年間目標に対する累積達成率。操作するたびに今日の日付で自動記録。</div>
  </section>

  <section class="card" style="margin-top:12px">
    <h2>Data</h2>
    <div class="meta">
      <span id="lastSaved">Auto saved.</span>
      <span id="pace"></span>
    </div>
    <div class="smallActions">
      <button class="ghost" id="exportData">Export</button>
      <button id="resetAll">Reset</button>
    </div>
  </section>
</div>

<script>
const SCRIPT_GOAL_MIN = 150 * 60;
const MOVIE_GOAL = 150;
const key = "write150_watch150_v4";

let old = JSON.parse(localStorage.getItem("write150_watch150_v1") || "null");
let state = JSON.parse(localStorage.getItem(key) || "null");

if(!state && old){
  state = {
    scriptMin: old.scriptMin || 0,
    movies: old.movies || 0,
    logs: old.logs || [],
    runningSince: old.runningSince || null,
    lastSessionMs: old.lastSessionMs || 0
  };
}
if(!state){
  state = {scriptMin:0, movies:0, logs:[], runningSince:null, lastSessionMs:0};
}

const $ = id => document.getElementById(id);
let tickInterval = null;

function today(){
  return new Date().toISOString().slice(0,10);
}
function niceToday(){
  const d = new Date();
  return d.toLocaleDateString("ja-JP", {year:"numeric", month:"2-digit", day:"2-digit", weekday:"short"});
}
function runningElapsedMin(){
  if(!state.runningSince) return 0;
  return (Date.now() - state.runningSince) / 60000;
}
function totalScriptMin(){
  return state.scriptMin + runningElapsedMin();
}
function save(autoLog=true){
  if(autoLog) logToday();
  localStorage.setItem(key, JSON.stringify(state));
  render();
}
function logToday(){
  const d = today();
  const snapshot = {
    date:d,
    scriptMin:Number(totalScriptMin().toFixed(4)),
    movies:Number(state.movies.toFixed(2))
  };
  const idx = state.logs.findIndex(x => x.date === d);
  if(idx >= 0) state.logs[idx] = snapshot;
  else state.logs.push(snapshot);
  state.logs.sort((a,b)=>a.date.localeCompare(b.date));
}
function fmtHMS(ms){
  const total = Math.floor(ms/1000);
  const h = String(Math.floor(total/3600)).padStart(2,"0");
  const m = String(Math.floor((total%3600)/60)).padStart(2,"0");
  const s = String(total%60).padStart(2,"0");
  return `${h}:${m}:${s}`;
}
function fmtMovie(n){
  return Number.isInteger(n) ? String(n) : n.toFixed(1);
}
function pct(n){
  return Math.min(100, Math.max(0,n));
}
function render(){
  $("todayLabel").textContent = niceToday();

  const sMin = totalScriptMin();
  const sHours = sMin/60;
  const sPct = pct(sMin/SCRIPT_GOAL_MIN*100);
  const mPct = pct(state.movies/MOVIE_GOAL*100);

  $("scriptHours").textContent = sHours.toFixed(1);
  $("scriptFill").style.width = sPct + "%";
  $("scriptPct").textContent = Math.floor(sPct);
  $("scriptRemain").textContent = `${Math.max(0,(SCRIPT_GOAL_MIN-sMin)/60).toFixed(1)}h left`;

  $("movieCount").textContent = fmtMovie(state.movies);
  $("movieFill").style.width = mPct + "%";
  $("moviePct").textContent = Math.floor(mPct);
  $("movieRemain").textContent = `${fmtMovie(Math.max(0, MOVIE_GOAL-state.movies))} left`;

  $("startStop").textContent = state.runningSince ? "Stop" : "Start";
  $("startStop").className = state.runningSince ? "" : "primary";
  $("timer").textContent = state.runningSince ? fmtHMS(Date.now()-state.runningSince) : fmtHMS(state.lastSessionMs || 0);

  const last = state.logs[state.logs.length-1];
  $("lastSaved").textContent = last ? `Last: ${last.date}` : "Auto saved.";
  $("pace").textContent = paceText();

  drawChart();
}
function paceText(){
  const start = new Date(new Date().getFullYear(),0,1);
  const now = new Date();
  const dayOfYear = Math.max(1, Math.ceil((now - start) / 86400000) + 1);
  const yearPct = dayOfYear / 365;
  const targetPct = yearPct * 100;
  const current = ((totalScriptMin()/SCRIPT_GOAL_MIN*100) + (state.movies/MOVIE_GOAL*100))/2;
  const diff = current - targetPct;
  return diff >= 0 ? `+${diff.toFixed(1)}% vs year pace` : `${diff.toFixed(1)}% vs year pace`;
}
function startStop(){
  if(state.runningSince){
    const elapsedMs = Date.now() - state.runningSince;
    state.lastSessionMs = elapsedMs;
    state.scriptMin += elapsedMs / 60000;
    state.runningSince = null;
    clearInterval(tickInterval);
    tickInterval = null;
  }else{
    state.lastSessionMs = 0;
    state.runningSince = Date.now();
    tickInterval = setInterval(render, 500);
  }
  save(true);
}
function addMin(min){
  state.scriptMin = Math.max(0, state.scriptMin + min);
  save(true);
}
function addMovieCount(n){
  state.movies = Math.max(0, state.movies + n);
  save(true);
}
function getSeries(){
  logToday();
  const logs = state.logs.map(x=>({...x}));
  if(logs.length === 0) return [];
  return logs;
}
function drawChart(){
  const c = $("chart");
  const ctx = c.getContext("2d");
  const w = c.width, h = c.height;
  ctx.clearRect(0,0,w,h);
  ctx.fillStyle = "#fff";
  ctx.fillRect(0,0,w,h);

  const padL = 58, padR = 24, padT = 24, padB = 48;
  const innerW = w-padL-padR, innerH = h-padT-padB;

  ctx.strokeStyle = "#e6e6e6";
  ctx.lineWidth = 1;

  for(let i=0;i<=4;i++){
    const y = padT + innerH*(i/4);
    ctx.beginPath();
    ctx.moveTo(padL,y);
    ctx.lineTo(w-padR,y);
    ctx.stroke();

    ctx.fillStyle = "#8a8a8a";
    ctx.font = "18px -apple-system, sans-serif";
    ctx.textAlign = "right";
    ctx.fillText(`${100-i*25}%`, padL-10, y+6);
  }

  const logs = getSeries();
  const startDate = logs.length ? new Date(logs[0].date) : new Date();
  const endDate = new Date();
  const span = Math.max(1, (endDate - startDate) / 86400000);

  function xFor(dateStr){
    const d = new Date(dateStr);
    return padL + (((d - startDate) / 86400000) / span) * innerW;
  }
  function yFor(p){
    const clamped = Math.min(100, Math.max(0,p));
    return padT + innerH * (1 - clamped/100);
  }
  function drawLine(points, color){
    if(points.length === 0) return;
    ctx.strokeStyle = color;
    ctx.lineWidth = 4;
    ctx.lineJoin = "round";
    ctx.lineCap = "round";
    ctx.beginPath();
    points.forEach((pt,i)=>{
      const x = xFor(pt.date), y = yFor(pt.p);
      if(i===0) ctx.moveTo(x,y);
      else ctx.lineTo(x,y);
    });
    ctx.stroke();

    ctx.fillStyle = color;
    points.forEach(pt=>{
      const x = xFor(pt.date), y = yFor(pt.p);
      ctx.beginPath();
      ctx.arc(x,y,4,0,Math.PI*2);
      ctx.fill();
    });
  }

  const writePts = logs.map(x=>({date:x.date, p:x.scriptMin/SCRIPT_GOAL_MIN*100}));
  const watchPts = logs.map(x=>({date:x.date, p:x.movies/MOVIE_GOAL*100}));

  drawLine(writePts, "#0b0b0b");
  drawLine(watchPts, "#ff4f1f");

  ctx.fillStyle = "#8a8a8a";
  ctx.font = "18px -apple-system, sans-serif";
  ctx.textAlign = "left";
  if(logs.length){
    ctx.fillText(logs[0].date.slice(5), padL, h-16);
    ctx.textAlign = "right";
    ctx.fillText(today().slice(5), w-padR, h-16);
  }else{
    ctx.fillText("No data yet", padL, h-16);
  }
}

$("startStop").onclick = startStop;
$("add10").onclick = () => addMin(10);
$("add30").onclick = () => addMin(30);
$("add90").onclick = () => addMin(90);
$("minus10").onclick = () => addMin(-10);
$("minus30").onclick = () => addMin(-30);
$("addCustom").onclick = () => {
  const v = Number($("customMin").value);
  if(v > 0){ addMin(v); $("customMin").value=""; }
};
$("minusCustom").onclick = () => {
  const v = Number($("customMin").value);
  if(v > 0){ addMin(-v); $("customMin").value=""; }
};

$("addMovie").onclick = () => addMovieCount(1);
$("addHalfMovie").onclick = () => addMovieCount(0.5);
$("minusMovie").onclick = () => addMovieCount(-1);
$("minusHalfMovie").onclick = () => addMovieCount(-0.5);
$("addCustomMovie").onclick = () => {
  const v = Number($("customMovie").value);
  if(v > 0){ addMovieCount(v); $("customMovie").value=""; }
};
$("minusCustomMovie").onclick = () => {
  const v = Number($("customMovie").value);
  if(v > 0){ addMovieCount(-v); $("customMovie").value=""; }
};

$("exportData").onclick = () => {
  logToday();
  const blob = new Blob([JSON.stringify(state,null,2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "150_data.json";
  a.click();
  URL.revokeObjectURL(url);
};
$("resetAll").onclick = () => {
  if(confirm("Reset all data?")){
    state = {scriptMin:0,movies:0,logs:[],runningSince:null,lastSessionMs:0};
    save(true);
  }
};

logToday();
if(state.runningSince) tickInterval = setInterval(render, 500);
save(false);
</script>
</body>
</html>
